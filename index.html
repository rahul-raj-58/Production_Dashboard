<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Analytics — Spyne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --ink: #15130f;
    --ink-soft: #3a342b;
    --paper: #f5f1e8;
    --paper-warm: #ede7d6;
    --rule: #15130f;
    --accent: #c8410b;
    --accent-soft: #e88a4a;
    --muted: #8a8474;
    --grid: rgba(21, 19, 15, 0.08);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter Tight', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(200, 65, 11, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(232, 138, 74, 0.05) 0%, transparent 50%);
    min-height: 100vh;
  }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 48px 40px 80px; }

  /* Masthead */
  .masthead {
    border-top: 3px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 28px 0 22px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    margin-bottom: 40px;
  }
  .masthead .left, .masthead .right {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .masthead .right { text-align: right; }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(36px, 5vw, 64px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-style: italic;
    text-align: center;
  }
  .masthead h1 em { font-style: normal; font-weight: 800; }

  .sub-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 56px;
    padding-bottom: 12px;
    border-bottom: 1px dotted rgba(21, 19, 15, 0.25);
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Loading / error */
  .state-box {
    padding: 80px 40px;
    text-align: center;
    border: 1px solid var(--rule);
    background: var(--paper-warm);
  }
  .state-box h2 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    margin-bottom: 12px;
  }
  .state-box p { color: var(--ink-soft); font-size: 14px; max-width: 540px; margin: 0 auto; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--ink);
    border-top-color: transparent;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn {
    margin-top: 20px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 10px 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .retry-btn:hover { background: var(--accent); }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
    margin-bottom: 64px;
  }
  .kpi {
    padding: 28px 24px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    transition: background 0.3s;
  }
  .kpi:hover { background: var(--paper-warm); }
  .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .kpi-value {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .kpi-value .small { font-size: 18px; color: var(--muted); font-style: italic; }
  .kpi-sub {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 10px;
  }

  /* Section headers */
  .section {
    margin-bottom: 64px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .section-head .num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .section-head h2 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
  }
  .section-head .meta {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Charts */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 32px;
  }
  .chart-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 24px;
    position: relative;
  }
  .chart-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .chart-subtitle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .chart-canvas-wrap {
    position: relative;
    height: 280px;
  }

  /* Table */
  .table-wrap {
    border: 1px solid var(--rule);
    overflow: auto;
    max-height: 540px;
    background: var(--paper);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead {
    position: sticky;
    top: 0;
    background: var(--ink);
    color: var(--paper);
    z-index: 1;
  }
  th {
    text-align: left;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { background: var(--accent); }
  th .sort-ind { opacity: 0.4; margin-left: 4px; }
  th.sorted .sort-ind { opacity: 1; }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(21, 19, 15, 0.08);
    font-family: var(--sans);
    white-space: nowrap;
  }
  td.numeric { font-family: var(--mono); text-align: right; }
  tbody tr:hover { background: var(--paper-warm); }

  .table-controls {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    align-items: center;
  }
  .table-controls input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .table-controls input:focus { border-color: var(--accent); }
  .table-controls .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 720px) {
    .wrap { padding: 24px 20px 60px; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .masthead .right { text-align: center; }
    .chart-grid { grid-template-columns: 1fr; }
    .sub-bar { flex-direction: column; gap: 8px; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="left">No. 001 &nbsp;·&nbsp; Vol. I</div>
    <h1>The <em>Daily</em> Numbers</h1>
    <div class="right" id="date-stamp">—</div>
  </div>

  <div class="sub-bar">
    <div><span class="status-dot"></span><span id="conn-status">Connecting to source…</span></div>
    <div id="source-info">Spyne · Metabase Public Question</div>
  </div>

  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      <h2>Fetching live data…</h2>
      <p>Pulling the latest from Metabase. If the source is large, this may take a moment.</p>
    </div>
  </div>

  <footer>
    <div>Live data dashboard · Auto-refreshed on load</div>
    <div>Source: <a href="https://metabase.spyne.ai/public/question/d5777560-dcd6-427f-a8c1-e745c4d24aa6" target="_blank">Metabase ↗</a></div>
  </footer>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CSV_URL = "https://metabase.spyne.ai/public/question/d5777560-dcd6-427f-a8c1-e745c4d24aa6.csv";

// Fallback CORS proxies (tried in order if direct fetch fails)
// Note: public CORS proxies are best-effort; for production, host your own.
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// Date stamp
document.getElementById('date-stamp').textContent =
  new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();

// ============================================================
// FETCH
// ============================================================
async function fetchCSV() {
  const attempts = [
    { label: 'direct', url: CSV_URL },
    ...CORS_PROXIES.map((fn, i) => ({ label: `proxy-${i+1}`, url: fn(CSV_URL) })),
  ];

  let lastErr;
  for (const a of attempts) {
    try {
      document.getElementById('conn-status').textContent = `Connecting via ${a.label}…`;
      const r = await fetch(a.url, { method: 'GET' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      if (!text || text.length < 10) throw new Error('Empty response');
      document.getElementById('conn-status').textContent = `Live · via ${a.label}`;
      return text;
    } catch (e) {
      lastErr = e;
      console.warn(`${a.label} failed:`, e);
    }
  }
  throw lastErr || new Error('All fetch attempts failed');
}

// ============================================================
// SCHEMA DETECTION
// ============================================================
function detectColumnType(values) {
  const nonNull = values.filter(v => v !== null && v !== undefined && v !== '');
  if (nonNull.length === 0) return { type: 'empty' };

  // Try numeric
  let numCount = 0;
  for (const v of nonNull) {
    const n = Number(String(v).replace(/[,\s]/g, ''));
    if (!isNaN(n) && isFinite(n)) numCount++;
  }
  if (numCount / nonNull.length > 0.85) {
    const nums = nonNull.map(v => Number(String(v).replace(/[,\s]/g, ''))).filter(n => !isNaN(n));
    return { type: 'numeric', min: Math.min(...nums), max: Math.max(...nums), sum: nums.reduce((a,b)=>a+b,0), count: nums.length };
  }

  // Try date
  let dateCount = 0;
  for (const v of nonNull.slice(0, Math.min(50, nonNull.length))) {
    const d = new Date(v);
    if (!isNaN(d.getTime()) && String(v).match(/[\-\/:]/)) dateCount++;
  }
  if (dateCount / Math.min(50, nonNull.length) > 0.8) {
    return { type: 'date' };
  }

  // Categorical
  const unique = new Set(nonNull.map(String));
  return { type: 'categorical', cardinality: unique.size, total: nonNull.length };
}

function analyzeSchema(rows, columns) {
  const schema = {};
  for (const col of columns) {
    schema[col] = detectColumnType(rows.map(r => r[col]));
  }
  return schema;
}

// ============================================================
// FORMATTING
// ============================================================
function fmtNumber(n, opts = {}) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (opts.compact && abs >= 1_000_000_000) return (n/1_000_000_000).toFixed(2).replace(/\.?0+$/, '') + 'B';
  if (opts.compact && abs >= 1_000_000) return (n/1_000_000).toFixed(2).replace(/\.?0+$/, '') + 'M';
  if (opts.compact && abs >= 1_000) return (n/1_000).toFixed(1).replace(/\.?0+$/, '') + 'K';
  return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

function fmtCell(v, type) {
  if (v === null || v === undefined || v === '') return '—';
  if (type === 'numeric') {
    const n = Number(String(v).replace(/[,\s]/g, ''));
    return isNaN(n) ? v : fmtNumber(n);
  }
  return String(v);
}

// ============================================================
// RENDER
// ============================================================
function render(rows, columns) {
  const schema = analyzeSchema(rows, columns);
  const numericCols = columns.filter(c => schema[c].type === 'numeric');
  const categoricalCols = columns.filter(c => schema[c].type === 'categorical');
  const dateCols = columns.filter(c => schema[c].type === 'date');

  const content = document.getElementById('content');
  content.innerHTML = '';

  // --- KPI cards ---
  const kpiData = [];
  kpiData.push({ label: 'Total Records', value: fmtNumber(rows.length, { compact: true }), sub: `${columns.length} fields tracked` });

  // Top numeric columns as KPIs (sum or avg)
  for (const col of numericCols.slice(0, 4)) {
    const s = schema[col];
    const sum = s.sum;
    const avg = s.sum / s.count;
    // Heuristic: if values are mostly large/integer & col name suggests count → show sum; otherwise avg
    const looksLikeCount = /count|total|num|qty|quantity|orders?|items?|users?|sessions?|visits?|clicks?|views?|amount|revenue|sales|sum|gmv/i.test(col);
    if (looksLikeCount) {
      kpiData.push({
        label: col,
        value: fmtNumber(sum, { compact: true }),
        sub: `avg ${fmtNumber(avg, { compact: true })} · max ${fmtNumber(s.max, { compact: true })}`
      });
    } else {
      kpiData.push({
        label: `Avg ${col}`,
        value: fmtNumber(avg, { compact: true }),
        sub: `range ${fmtNumber(s.min, { compact: true })}–${fmtNumber(s.max, { compact: true })}`
      });
    }
  }

  // If we have a low-cardinality categorical, show "categories" count
  for (const col of categoricalCols) {
    const s = schema[col];
    if (s.cardinality > 1 && s.cardinality <= 50 && kpiData.length < 6) {
      kpiData.push({ label: `Unique ${col}`, value: fmtNumber(s.cardinality), sub: `across ${fmtNumber(s.total)} entries` });
    }
  }

  const kpiGrid = document.createElement('div');
  kpiGrid.className = 'kpi-grid';
  kpiGrid.innerHTML = kpiData.slice(0, 6).map(k => `
    <div class="kpi">
      <div class="kpi-label">${escapeHtml(k.label)}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${escapeHtml(k.sub)}</div>
    </div>
  `).join('');
  content.appendChild(kpiGrid);

  // --- Charts section ---
  const chartsSection = document.createElement('section');
  chartsSection.className = 'section';
  chartsSection.innerHTML = `
    <div class="section-head">
      <span class="num">§ 01</span>
      <h2>Visual breakdown</h2>
      <span class="meta">Auto-generated from schema</span>
    </div>
    <div class="chart-grid" id="chart-grid"></div>
  `;
  content.appendChild(chartsSection);

  const chartGrid = document.getElementById('chart-grid');
  const chartConfigs = buildChartConfigs(rows, columns, schema, numericCols, categoricalCols, dateCols);

  if (chartConfigs.length === 0) {
    chartGrid.innerHTML = `<div class="chart-card"><div class="chart-title">No charts available</div><div class="chart-subtitle">Schema didn't yield numeric or categorical breakdowns</div></div>`;
  }

  chartConfigs.forEach((cfg, idx) => {
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-title">${escapeHtml(cfg.title)}</div>
      <div class="chart-subtitle">${escapeHtml(cfg.subtitle)}</div>
      <div class="chart-canvas-wrap"><canvas id="chart-${idx}"></canvas></div>
    `;
    chartGrid.appendChild(card);
    renderChart(`chart-${idx}`, cfg);
  });

  // --- Data table ---
  const tableSection = document.createElement('section');
  tableSection.className = 'section';
  tableSection.innerHTML = `
    <div class="section-head">
      <span class="num">§ 02</span>
      <h2>The raw record</h2>
      <span class="meta">${rows.length} rows · ${columns.length} cols</span>
    </div>
    <div class="table-controls">
      <input type="text" id="search" placeholder="Filter rows…" />
      <span class="count" id="row-count">${rows.length} rows</span>
    </div>
    <div class="table-wrap">
      <table id="data-table">
        <thead><tr>${columns.map(c => `<th data-col="${escapeHtml(c)}">${escapeHtml(c)}<span class="sort-ind">↕</span></th>`).join('')}</tr></thead>
        <tbody></tbody>
      </table>
    </div>
  `;
  content.appendChild(tableSection);

  setupTable(rows, columns, schema);
}

// ============================================================
// CHART CONFIG BUILDERS
// ============================================================
function buildChartConfigs(rows, columns, schema, numericCols, categoricalCols, dateCols) {
  const configs = [];

  // 1) Categorical × Numeric → bar chart (top N)
  for (const catCol of categoricalCols) {
    const s = schema[catCol];
    if (s.cardinality > 30 || s.cardinality < 2) continue;
    const numCol = numericCols[0];
    if (numCol) {
      const agg = {};
      for (const row of rows) {
        const k = String(row[catCol] ?? '—');
        const v = Number(String(row[numCol] ?? '').replace(/[,\s]/g, ''));
        if (!isNaN(v)) agg[k] = (agg[k] || 0) + v;
      }
      const sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]).slice(0, 12);
      configs.push({
        type: 'bar',
        title: `${numCol} by ${catCol}`,
        subtitle: `Top ${sorted.length} · summed`,
        labels: sorted.map(s => s[0]),
        data: sorted.map(s => s[1]),
        dataLabel: numCol,
      });
    } else {
      // Just count occurrences
      const agg = {};
      for (const row of rows) {
        const k = String(row[catCol] ?? '—');
        agg[k] = (agg[k] || 0) + 1;
      }
      const sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]).slice(0, 12);
      configs.push({
        type: sorted.length <= 6 ? 'doughnut' : 'bar',
        title: `Distribution of ${catCol}`,
        subtitle: `Count of records · top ${sorted.length}`,
        labels: sorted.map(s => s[0]),
        data: sorted.map(s => s[1]),
        dataLabel: 'Count',
      });
    }
    if (configs.length >= 2) break;
  }

  // 2) Date × Numeric → line chart
  if (dateCols.length && numericCols.length) {
    const dCol = dateCols[0];
    const nCol = numericCols[0];
    const points = rows
      .map(r => ({ d: new Date(r[dCol]), v: Number(String(r[nCol] ?? '').replace(/[,\s]/g, '')) }))
      .filter(p => !isNaN(p.d.getTime()) && !isNaN(p.v))
      .sort((a, b) => a.d - b.d);
    if (points.length > 1) {
      // Aggregate by day
      const agg = {};
      for (const p of points) {
        const key = p.d.toISOString().slice(0, 10);
        agg[key] = (agg[key] || 0) + p.v;
      }
      const entries = Object.entries(agg).sort();
      configs.push({
        type: 'line',
        title: `${nCol} over time`,
        subtitle: `Daily · by ${dCol}`,
        labels: entries.map(e => e[0]),
        data: entries.map(e => e[1]),
        dataLabel: nCol,
      });
    }
  }

  // 3) Numeric distribution → histogram
  for (const nCol of numericCols.slice(0, 2)) {
    const vals = rows.map(r => Number(String(r[nCol] ?? '').replace(/[,\s]/g, ''))).filter(n => !isNaN(n));
    if (vals.length < 5) continue;
    const min = Math.min(...vals), max = Math.max(...vals);
    if (min === max) continue;
    const bins = Math.min(15, Math.max(5, Math.floor(Math.sqrt(vals.length))));
    const w = (max - min) / bins;
    const counts = new Array(bins).fill(0);
    for (const v of vals) {
      const i = Math.min(bins - 1, Math.floor((v - min) / w));
      counts[i]++;
    }
    const labels = counts.map((_, i) => {
      const lo = min + i * w, hi = min + (i + 1) * w;
      return `${fmtNumber(lo, {compact:true})}–${fmtNumber(hi, {compact:true})}`;
    });
    configs.push({
      type: 'bar',
      title: `Distribution of ${nCol}`,
      subtitle: `Histogram · ${bins} bins`,
      labels,
      data: counts,
      dataLabel: 'Frequency',
    });
    if (configs.length >= 4) break;
  }

  return configs.slice(0, 4);
}

// ============================================================
// CHART RENDER
// ============================================================
function renderChart(canvasId, cfg) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const accent = '#c8410b';
  const accentSoft = '#e88a4a';
  const ink = '#15130f';
  const palette = ['#c8410b', '#15130f', '#8a8474', '#e88a4a', '#3a342b', '#bfa980', '#6e4e2a', '#a8895c'];

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: cfg.type === 'doughnut', position: 'bottom', labels: { font: { family: 'JetBrains Mono', size: 10 }, color: ink, padding: 12 } },
      tooltip: {
        backgroundColor: ink,
        titleFont: { family: 'Fraunces', size: 13, weight: '600' },
        bodyFont: { family: 'JetBrains Mono', size: 11 },
        padding: 12,
        cornerRadius: 0,
      }
    },
    scales: cfg.type === 'doughnut' ? {} : {
      x: { ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: '#8a8474', maxRotation: 45, minRotation: 0 }, grid: { color: 'rgba(21,19,15,0.06)' } },
      y: { ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: '#8a8474', callback: v => fmtNumber(v, {compact:true}) }, grid: { color: 'rgba(21,19,15,0.06)' } },
    }
  };

  let datasetCfg;
  if (cfg.type === 'doughnut') {
    datasetCfg = {
      data: cfg.data,
      backgroundColor: cfg.data.map((_, i) => palette[i % palette.length]),
      borderColor: '#f5f1e8',
      borderWidth: 2,
    };
  } else if (cfg.type === 'line') {
    datasetCfg = {
      label: cfg.dataLabel,
      data: cfg.data,
      borderColor: accent,
      backgroundColor: 'rgba(200, 65, 11, 0.08)',
      fill: true,
      tension: 0.3,
      pointRadius: 3,
      pointBackgroundColor: accent,
      pointBorderColor: '#f5f1e8',
      pointBorderWidth: 1.5,
      borderWidth: 2,
    };
  } else {
    datasetCfg = {
      label: cfg.dataLabel,
      data: cfg.data,
      backgroundColor: accent,
      hoverBackgroundColor: accentSoft,
      borderWidth: 0,
    };
  }

  new Chart(ctx, {
    type: cfg.type,
    data: { labels: cfg.labels, datasets: [datasetCfg] },
    options: baseOpts,
  });
}

// ============================================================
// TABLE
// ============================================================
let tableState = { sortCol: null, sortDir: 1, filter: '' };

function setupTable(rows, columns, schema) {
  const tbody = document.querySelector('#data-table tbody');
  const search = document.getElementById('search');
  const countEl = document.getElementById('row-count');

  function paint() {
    let filtered = rows;
    if (tableState.filter) {
      const f = tableState.filter.toLowerCase();
      filtered = rows.filter(r => columns.some(c => String(r[c] ?? '').toLowerCase().includes(f)));
    }
    if (tableState.sortCol) {
      const col = tableState.sortCol;
      const dir = tableState.sortDir;
      const isNum = schema[col].type === 'numeric';
      filtered = [...filtered].sort((a, b) => {
        let av = a[col], bv = b[col];
        if (isNum) { av = Number(String(av).replace(/[,\s]/g,'')); bv = Number(String(bv).replace(/[,\s]/g,'')); }
        else { av = String(av ?? ''); bv = String(bv ?? ''); }
        if (av < bv) return -dir;
        if (av > bv) return dir;
        return 0;
      });
    }
    // Cap display at 500 rows for performance
    const display = filtered.slice(0, 500);
    tbody.innerHTML = display.map(r =>
      `<tr>${columns.map(c => {
        const cls = schema[c].type === 'numeric' ? ' class="numeric"' : '';
        return `<td${cls}>${escapeHtml(fmtCell(r[c], schema[c].type))}</td>`;
      }).join('')}</tr>`
    ).join('');
    countEl.textContent = `${filtered.length} rows${filtered.length > 500 ? ' (showing 500)' : ''}`;
  }

  search.addEventListener('input', e => { tableState.filter = e.target.value; paint(); });

  document.querySelectorAll('#data-table th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (tableState.sortCol === col) tableState.sortDir *= -1;
      else { tableState.sortCol = col; tableState.sortDir = 1; }
      document.querySelectorAll('#data-table th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.sort-ind').textContent = tableState.sortDir === 1 ? '↓' : '↑';
      paint();
    });
  });

  paint();
}

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="state-box">
      <h2>Couldn't reach the source</h2>
      <p>${escapeHtml(msg)}</p>
      <p style="margin-top:12px">This usually means the Metabase server is blocking cross-origin requests (CORS) and our public proxies are unavailable. For production, host this dashboard on Vercel and add a serverless function to proxy the CSV, or have Metabase admin enable CORS.</p>
      <button class="retry-btn" onclick="boot()">Retry</button>
    </div>
  `;
  document.getElementById('conn-status').textContent = 'Connection failed';
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  document.getElementById('content').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <h2>Fetching live data…</h2>
      <p>Pulling the latest from Metabase. If the source is large, this may take a moment.</p>
    </div>
  `;
  try {
    const csv = await fetchCSV();
    const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true, dynamicTyping: false });
    if (!parsed.data || parsed.data.length === 0) {
      showError('CSV parsed but contained no rows.');
      return;
    }
    const columns = parsed.meta.fields || Object.keys(parsed.data[0]);
    render(parsed.data, columns);
  } catch (e) {
    console.error(e);
    showError(e.message || String(e));
  }
}

boot();
</script>
